version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: eduai-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: eduai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/eduaihub
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:9002,http://127.0.0.1:9002
    depends_on:
      - mongodb
      - redis
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./newfrontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: eduai-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - '9002:9002'

volumes:
  mongo_data:
  redis_data:
